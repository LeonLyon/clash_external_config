version = 1
custom_proxy_group = AI解锁`select`[]美国节点`[]日本节点
custom_proxy_group = 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,5,100
custom_proxy_group = 节点选择`select`[]自动选择`[]香港节点`[]美国节点`[]日本节点`.*`[]DIRECT
custom_proxy_group = 香港节点`url-test`(香港|HK|hk)`http://www.gstatic.com/generate_204`300,5,100
custom_proxy_group = 美国节点`url-test`(美国|US|us)`http://www.gstatic.com/generate_204`300,5,100
custom_proxy_group = 日本节点`url-test`(日本|JP|jp)`http://www.gstatic.com/generate_204`300,5,100
# custom_proxy_group = 全球直连`select`[]DIRECT
# custom_proxy_group = 全球拦截`select`[]REJECT
custom_proxy_group = 漏网之鱼`select`[]DIRECT`[]节点选择`[]自动选择`[]香港节点`.*
# 广告封锁 (全面替代 category-ads-all)
ruleset=REJECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising.list
# 局域网与直连 (全面替代 private)
ruleset=DIRECT,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.list
#ruleset=全球直连,rules/direct_custom.list
# Ai解锁 (独立分流，确保100%命中AI策略组)
ruleset=AI解锁,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list
ruleset=AI解锁,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.list
ruleset=AI解锁,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.list
ruleset=AI解锁,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.list
